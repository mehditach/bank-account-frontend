<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header bg-dark text-white">
          <i class="bi bi-key-fill"></i> Changer le mot de passe
        </div>
        <div class="card-body">
          @if (message()) {
            <div class="alert" [class.alert-success]="!isError()" [class.alert-danger]="isError()">
              {{ message() }}
            </div>
          }

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Ancien mot de passe</label>
              <input type="password" [(ngModel)]="oldPassword" name="oldPassword" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Nouveau mot de passe</label>
              <input type="password" [(ngModel)]="newPassword" name="newPassword" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirmer le nouveau mot de passe</label>
              <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Changer le mot de passe</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
