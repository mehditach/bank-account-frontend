<div class="container mt-4">
  <h2 class="mb-3"><i class="bi bi-wallet2"></i> Liste des Comptes Bancaires</h2>
  <table class="table table-striped table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Type</th>
        <th>Solde</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (a of accounts(); track a.id) {
        <tr>
          <td>{{ a.id }}</td>
          <td>{{ a.customer.name }}</td>
          <td>
            @if (a.type === 'CurrentAccount') {
              <span class="badge bg-primary">Compte Courant</span>
            } @else {
              <span class="badge bg-success">Compte Épargne</span>
            }
          </td>
          <td>{{ a.balance | number:'1.2-2' }} DH</td>
          <td>{{ a.status }}</td>
          <td>
            <a [routerLink]="['/accounts', a.id]" class="btn btn-info btn-sm">
              <i class="bi bi-eye"></i> Voir
            </a>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
