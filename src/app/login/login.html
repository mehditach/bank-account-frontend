<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
          <h4><i class="bi bi-bank"></i> Bank Manager</h4>
        </div>
        <div class="card-body">
          @if (errorMessage()) {
            <div class="alert alert-danger">{{ errorMessage() }}</div>
          }

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Identifiant</label>
              <input type="text" [(ngModel)]="username" name="username" class="form-control" placeholder="Identifiant">
            </div>
            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" [(ngModel)]="password" name="password" class="form-control" placeholder="Mot de passe">
            </div>
            <button type="submit" class="btn btn-dark w-100">Se connecter</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
